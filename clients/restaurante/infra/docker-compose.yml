services:
  restaurante-php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: restaurante-php
    platform: linux/amd64
    working_dir: /var/www/html
    volumes:
      - ../app:/var/www/html
    networks:
      - restaurante-net

  restaurante-nginx:
    image: nginx:1.24-alpine
    container_name: restaurante-nginx
    platform: linux/amd64
    ports:
      - "8093:80"
    volumes:
      - ../app:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - restaurante-php
    networks:
      - restaurante-net

  restaurante-mysql:
    image: mysql:5.7
    container_name: restaurante-mysql
    platform: linux/amd64
    command:
      - --sql-mode=
      - --default-time-zone=America/Sao_Paulo
    ports:
      - "3316:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "SENHA"
      MYSQL_DATABASE: "wwgepr_rest_tilapia"
      MYSQL_USER: "wwgepr_rest_tilapia"
      MYSQL_PASSWORD: "gepros15082008"
      TZ: "America/Sao_Paulo"
    volumes:
      - restaurante_mysql_data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
      - ../database:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin --no-defaults ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      restaurante-net:
        ipv4_address: 172.28.0.2

networks:
  restaurante-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  restaurante_mysql_data:
