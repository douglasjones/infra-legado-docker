services:
  america-clean-php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: america-clean-php
    platform: linux/amd64
    working_dir: /var/www/html
    volumes:
      - ../app:/var/www/html
    networks:
      - america-clean-net

  america-clean-nginx:
    image: nginx:1.24-alpine
    container_name: america-clean-nginx
    platform: linux/amd64
    ports:
      - "8081:80"
    volumes:
      - ../app:/var/www/html:ro
      - ./docker/nginx/default.clean.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - america-clean-php
    networks:
      - america-clean-net

networks:
  america-clean-net:
    external: true
    name: america-servis_america-net
