services:
  america-php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: america-php
    platform: linux/amd64
    working_dir: /var/www/html
    volumes:
      - ../app:/var/www/html
    networks:
      - america-net

  america-nginx:
    image: nginx:1.24-alpine
    container_name: america-nginx
    platform: linux/amd64
    ports:
      - "8080:80"
    volumes:
      - ../app:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - america-php
    networks:
      - america-net

  america-mysql:
    image: mysql:5.7
    container_name: america-mysql
    platform: linux/amd64
    command:
      - --sql-mode=
      - --default-time-zone=America/Sao_Paulo
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "SENHA"
      MYSQL_DATABASE: "gepros1com_americaservis"
      MYSQL_USER: "gepros1com_americaservis"
      MYSQL_PASSWORD: "gepros15082008"
      TZ: "America/Sao_Paulo"
    volumes:
      - america_mysql_data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin --no-defaults ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - america-net

networks:
  america-net:
    driver: bridge

volumes:
  america_mysql_data:
    external: true
    name: america-servis_america_mysql_data
