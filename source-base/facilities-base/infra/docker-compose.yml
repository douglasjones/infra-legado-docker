name: vistoriza_at

services:
  vistoriza-at-php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: vistoriza-at-php
    platform: linux/amd64
    working_dir: /var/www/html
    environment:
      DB_HOST: vistoriza-at-mysql
      DB_USER: gepros1com_vistoriza
      DB_PASSWORD: gepros15082008
      DB_NAME: gepros1com_vistoriza
    volumes:
      - ../app:/var/www/html
    networks:
      - vistoriza-at-net

  vistoriza-at-nginx:
    image: nginx:1.24-alpine
    container_name: vistoriza-at-nginx
    platform: linux/amd64
    ports:
      - "8094:80"
    volumes:
      - ../app:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - vistoriza-at-php
    networks:
      - vistoriza-at-net

  vistoriza-at-mysql:
    image: mysql:5.7
    container_name: vistoriza-at-mysql
    platform: linux/amd64
    command:
      - --sql-mode=
      - --default-time-zone=America/Sao_Paulo
    ports:
      - "3317:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "SENHA"
      MYSQL_DATABASE: "gepros1com_vistoriza"
      MYSQL_USER: "gepros1com_vistoriza"
      MYSQL_PASSWORD: "gepros15082008"
      TZ: "America/Sao_Paulo"
    volumes:
      - vistoriza_at_mysql_data:/var/lib/mysql
      - ./docker/mysql/conf.d:/etc/mysql/conf.d:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin --no-defaults ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - vistoriza-at-net

networks:
  vistoriza-at-net:
    driver: bridge

volumes:
  vistoriza_at_mysql_data:
